name: windows 2022 Qt6

on:
  push:
    branches:
      - main
      - CI
  pull_request: {}

jobs:

  windows-Qt6:
    runs-on: windows-latest
    # NB: see https://github.com/actions/runner-images/blob/main/images/windows/Windows2022-Readme.md for what's available in this image
    steps:
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          install-deps: 'true'
      - name: restore
        env:
          VCPKG_BUILD_TYPE: Release
        run: |
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          C:\vcpkg\vcpkg install --triplet x64-windows zlib tiff libpng openjpeg libjpeg-turbo exiv2 opengl libmupdf
      - name: Install boost
        env:
          VCPKG_BUILD_TYPE: Release
        run: |
          C:\vcpkg\vcpkg install --triplets x64-windows-static boost-core boost-foreach boost-bind boost-multi-index boost-mpl boost-test boost-iterator boost-intrusive boost-random boost-range boost-type-traits
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: build
        env:
          QT_VER: 'Qt6'
          # must be passed in cmd line
          CMAKE_BUILD_TYPE: Release
          CMAKE_BUILD_PARALLEL_LEVEL: 8
          QT_ROOT_DIR: '${{ github.workspace }}\Qt\6.9.0\msvc2022_64\'
          CMAKE_PREFIX_PATH: '${{ github.workspace }}\Qt\6.9.0\msvc2022_64\'
          CMAKE_TOOLCHAIN_FILE: 'C:\vcpkg\scripts\buildsystems\vcpkg.cmake'
          VCPKG_TARGET_TRIPLET: 'x64-windows'
        run: |
          .build\build.ps1 -DPath C:\vcpkg\installed\x64-windows -DCMAKE_BUILD_TYPE="$CMAKE_BUILD_TYPE" -DCMAKE_CXX_STANDARD=11 -DENABLE_TESTS=off -DVCPKG_TARGET_TRIPLET=x86-windows -DCMAKE_CXX_STANDARD_REQUIRED=ON -DCMAKE_CXX_EXTENSIONS=OFF -DQtPkgList="${{ env.QT_VER }}" -DCMAKE_BUILD_TYPE="${{ env.CMAKE_BUILD_TYPE }}" -DVCPKG_TARGET_TRIPLET="${{ env.VCPKG_TARGET_TRIPLET }}" -verbose
        shell: powershell
      - name: Run autotests
        env:
          QT_QPA_PLATFORM: 'offscreen'
        run: .build\test.ps1
        shell: powershell

